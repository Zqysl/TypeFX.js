<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeFX.js Test Cases</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <script src="../dist/typefx.umd.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            max-width: 800px;
            margin: 3em auto;
            padding: 0 1em;
        }

        .title {
            text-align: center;
            margin-bottom: 2em;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .testcase {
            background: #fff;
            border-radius: 18px;
            padding: 1.5em 2em;
            margin-bottom: 1.5em;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            position: relative;
            transition: transform 0.2s ease;
        }

        .testcase:hover {
            transform: translateY(-2px);
        }

        .case-title {
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #86868b;
            margin-bottom: 1em;
        }

        .content {
            font-size: 1.2em;
            line-height: 1.4;
            min-height: 1.4em;
        }

        .replay-btn {
            position: absolute;
            top: 1.5em;
            right: 2em;
            border: none;
            background: #f5f5f7;
            color: #1d1d1f;
            padding: 0.4em 1em;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .replay-btn:hover {
            background: #0071e3;
            color: #fff;
        }

        .replay-btn:active {
            transform: scale(0.95);
        }

        .replay-all-btn {
            position: fixed;
            bottom: 2em;
            right: 2em;
            z-index: 100;
            background: #1d1d1f;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 1em 1.5em;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
            gap: 0.5em;
            font-family: inherit;
        }

        .replay-all-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            background: #000;
        }

        .replay-all-btn:active {
            transform: scale(0.95);
        }

        .replay-all-btn svg {
            width: 1.2em;
            height: 1.2em;
            transition: transform 0.6s ease;
        }

        .replay-all-btn:hover svg {
            transform: rotate(-360deg);
        }
    </style>
</head>

<body>
    <h1 class="title">TypeFX.js Test Cases</h1>
    <div id="test-container"></div>

    <button id="replay-all-btn" class="replay-all-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 4v6h-6"></path>
            <path d="M1 20v-6h6"></path>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
        Replay All
    </button>

    <template id="testcase-template">
        <div class="testcase">
            <div class="case-title"></div>
            <button class="replay-btn">Replay</button>
            <p class="content"></p>
        </div>
    </template>

    <script type="module" src="../test-dist/test/tests.js"></script>
</body>

</html>
